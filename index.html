<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的網址收藏1.0.4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>我的網址收藏</h1>

<!-- 新增網址 -->
<div class="form">
    <input id="name" type="text" placeholder="名稱（例如：YouTube）">
    <input id="url" type="url" placeholder="網址（例如：https://www.youtube.com）">

    <!-- 是否加入資料夾 -->
    <select id="folderSelect">
        <option value="_none_">不加入資料夾（未分類）</option>
    </select>

    <button id="addBtn">新增</button>
</div>

<!-- 新增資料夾 -->
<div class="form">
    <input id="newFolder" type="text" placeholder="新增資料夾名稱">
    <button id="addFolderBtn">新增資料夾</button>
</div>

<!-- 主畫面：資料夾 + 未分類 -->
<div id="folderView">
    <h2>資料夾</h2>
    <ul id="folderList"></ul>

    <h2>未分類網址</h2>
    <ul id="uncategorizedList"></ul>
</div>

<!-- 資料夾內頁 -->
<div id="linkView" style="display:none;">
    <h2 id="currentFolderTitle"></h2>

    <ul id="list"></ul>

    <button id="backBtn">返回</button>
</div>

<script src="script.js"></script>
</body>
</html>
